services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: motdepasse
    volumes:
      - mongo_data:/data/db
      - "C:/Users/ingmo/OneDrive/Documents/Epssi/Master2_IPSSI/007_Architecture_BIGDATA/jour1/KboOpenData_0404_2026_06_28_Full:/data/import"

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: motdepasse
      ME_CONFIG_MONGODB_SERVER: mongodb

volumes:
  mongo_data: